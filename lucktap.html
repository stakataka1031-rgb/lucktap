<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LuckTap</title>
<style>
body {
  text-align: center;
  font-family: Arial;
  background: #111;
  color: white;
}

h1 {
  margin-top: 30px;
}

button {
  font-size: 40px;
  padding: 20px 40px;
  border-radius: 15px;
  border: none;
  background: gold;
  cursor: pointer;
}

#result {
  margin-top: 30px;
  font-size: 30px;
  height: 60px;
}

#coins, #diamonds, #level {
  margin-top: 10px;
  font-size: 20px;
}
</style>
</head>

<body>

<h1>LuckTap</h1>

<button onclick="gacha()">ガチャる</button>

<div id="result"></div>

<div id="coins">コイン: 0</div>
<div id="diamonds">ダイヤ: 0</div>
<div id="level">Lv.1 (0 XP)</div>

<script>
let coins = 0;
let diamonds = 0;
let xp = 0;
let level = 1;
let pity = 0; // 天井カウント

function gacha() {
  let r = Math.random();
  let text = "";

  pity++;

  // 天井
  if (pity >= 50) {
    diamonds++;
    text = "🌈 天井発動！ダイヤGET！！";
    pity = 0;
  } else if (r < 0.6) {
    let gain = Math.floor(Math.random()*15)+5;
    coins += gain;
    text = "+" + gain + "コイン";
  } else if (r < 0.9) {
    let gain = Math.floor(Math.random()*100)+50;
    coins += gain;
    text = "✨ +" + gain + "コイン！";
  } else if (r < 0.99) {
    let gain = Math.floor(Math.random()*300)+200;
    coins += gain;
    text = "🔥 +" + gain + "コイン！！";
  } else {
    diamonds++;
    text = "💎 ダイヤGET！！！";
    pity = 0;
  }

  // ニアミス演出（10%）
  if (Math.random() < 0.1 && r > 0.9) {
    text += "（惜しい…！）";
  }

  // XP & レベル
  xp += 5;
  if (xp >= level * 50) {
    xp = 0;
    level++;
    text += " 🎉レベルUP！";
  }

  document.getElementById("result").innerText = text;
  document.getElementById("coins").innerText = "コイン: " + coins;
  document.getElementById("diamonds").innerText = "ダイヤ: " + diamonds;
  document.getElementById("level").innerText = "Lv." + level + " (" + xp + " XP)";
}
</script>

</body>
</html>
